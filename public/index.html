<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Updater Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 16px;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 16px;
        border: 1px solid #1f2937;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }
      code {
        color: #fde68a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>AI Updater Pro</h1>
      <p>
        If you opened this inside Telegram, the client can pass your Telegram user id to a future API.
        For now this page is a placeholder dashboard — the real status capture happens from group messages
        and dispatcher buttons.
      </p>
      <p id="who"></p>
    </div>
    <script>
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        const u = tg.initDataUnsafe && tg.initDataUnsafe.user;
        document.getElementById("who").innerHTML = u
          ? "Signed in Telegram user: <code>" +
            (u.first_name || "") +
            " " +
            (u.last_name || "") +
            "</code> id <code>" +
            u.id +
            "</code>"
          : "No Telegram user payload (open from Telegram).";
      } else {
        document.getElementById("who").textContent =
          "Open this URL from a Telegram Web App button for full context.";
      }
    </script>
  </body>
</html>
